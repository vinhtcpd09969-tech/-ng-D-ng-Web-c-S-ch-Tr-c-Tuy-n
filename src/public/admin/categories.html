<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="../assets/css/admin-categories.css">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <nav id="sidebar-container" class="col-md-3 col-lg-2 d-md-block sidebar collapse"></nav>
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <h2 class="section-title text-primary fw-bold mb-4">
                <i class="fas fa-tags me-2"></i> Quản lý Danh mục
            </h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-white py-3">
                            <h5 class="card-title fw-bold mb-0" id="modal-title">Thêm Danh mục mới</h5>
                        </div>
                        <div class="card-body">
                            <form id="category-form">
                                <input type="hidden" id="cat-id">
                                <div class="mb-3">
                                    <label class="form-label text-muted fw-bold small">TÊN DANH MỤC</label>
                                    <input type="text" id="cat-name" class="form-control form-control-lg" placeholder="Nhập tên..." required>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="button" class="btn btn-primary btn-lg fw-bold" onclick="saveCategory()">
                                        <i class="fas fa-save me-1"></i> Lưu lại
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="bg-light">
                                        <tr>
                                            <th class="ps-4 py-3">ID</th>
                                            <th>Tên danh mục</th>
                                            <th class="text-end pe-4">Hành động</th>
                                        </tr>
                                    </thead>
                                    <tbody id="category-list"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/admin-layout.js"></script>
<script src="../assets/js/admin-categories.js"></script> 
</body>
</html>
