<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="../assets/css/admin-users.css"> </head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav id="sidebar-container" class="col-md-3 col-lg-2 d-md-block sidebar collapse"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <h2 class="section-title text-primary fw-bold mb-4">
                <i class="fas fa-users me-2"></i> Quản lý Người dùng
            </h2>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold">Danh sách thành viên</h5>
                    <div class="input-group w-auto">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="search-input" class="form-control border-0 bg-light" placeholder="Tìm kiếm user...">
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light">
                                <tr>
                                    <th class="ps-4 py-3">ID</th>
                                    <th>Họ và tên</th>
                                    <th>Email</th>
                                    <th>Vai trò</th>
                                    <th>Ngày tham gia</th>
                                    <th class="text-end pe-4">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="user-list">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<template id="user-row-template">
    <tr>
        <td class="ps-4 fw-bold text-secondary user-id"></td>
        <td>
            <div class="d-flex align-items-center">
                <div class="avatar-placeholder rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                    <span class="fw-bold user-initial"></span>
                </div>
                <div>
                    <div class="fw-bold text-dark user-name"></div>
                    <small class="text-muted">Thành viên tích cực</small>
                </div>
            </div>
        </td>
        <td class="user-email text-muted"></td>
        <td><span class="badge user-role"></span></td>
        <td class="user-date text-muted"></td>
        <td class="text-end pe-4 action-cell">
            </td>
    </tr>
</template>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/admin-layout.js"></script>
<script src="../assets/js/admin-users.js"></script> </body>
</html>
