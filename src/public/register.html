<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - PolyBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <div class="card shadow-lg border-0" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <a href="index.html" class="text-decoration-none">
                    <h2 class="fw-bold text-primary text-uppercase">
                        <i class="fas fa-book-reader me-2"></i>PolyBook
                    </h2>
                </a>
                <p class="text-muted">Tạo tài khoản mới</p>
            </div>

            <div id="register-alert"></div>

            <form id="register-form">
                <div class="mb-3">
                    <label class="form-label fw-bold">Họ và Tên</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="fullname" placeholder="Nguyễn Văn A" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                    Đăng Ký Tài Khoản
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted">Đã có tài khoản? <a href="login.html" class="text-primary fw-bold">Đăng nhập ngay</a></p>
                <a href="index.html" class="small text-secondary"><i class="fas fa-arrow-left me-1"></i>Về trang chủ</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="assets/js/common.js"></script>
    <script src="assets/js/register.js"></script>
</body>
</html>
