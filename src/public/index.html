<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyBook Review - Trang Chủ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">
                <i class="fas fa-book-open me-2"></i>PolyBook Review
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Trang chủ</a></li>
                    
                    <li class="nav-item" id="login-nav-item">
                        <a class="nav-link btn btn-warning text-dark ms-3 fw-bold px-4 nav-link-login" href="login.html">Đăng nhập</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4 flex-grow-1">
        <div class="row">
            
            <aside class="col-lg-3 mb-4">
                <div class="sticky-top" style="top: 80px; z-index: 1;">
                    
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-primary text-white fw-bold text-uppercase py-3">
                            <i class="fas fa-list-ul me-2"></i> Thể Loại Truyện
                        </div>
                        <div class="card-body p-0">
                            <select id="category-filter" class="form-select border-0 shadow-none w-100 h-100" size="10" style="overflow-y: auto;">
                                <option value="" selected>🌟 Tất cả danh mục</option>
                            </select>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-danger text-white fw-bold text-uppercase py-3">
                            <i class="fas fa-fire me-2"></i> Top Đọc Nhiều
                        </div>
                        <div class="card-body p-0">
                            <ul class="list-group list-group-flush" id="top-books-list">
                                <li class="list-group-item text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm text-danger me-2" role="status"></div>Đang tải...
                                </li>
                            </ul>
                        </div>
                    </div>

                </div>
            </aside>

            <section class="col-lg-9">
                
                <div id="promoBanner" class="carousel slide mb-4 shadow-sm rounded overflow-hidden" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#promoBanner" data-bs-slide-to="0" class="active"></button>
                        <button type="button" data-bs-target="#promoBanner" data-bs-slide-to="1"></button>
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="https://placehold.co/900x250/0d6efd/white?text=PolyBook+Review\nKho+T%C3%A0ng+S%C3%A1ch+Kh%E1%BB%95ng+L%E1%BB%93" class="d-block w-100" alt="Banner 1" style="height: 250px; object-fit: cover;">
                        </div>
                        <div class="carousel-item">
                            <img src="https://placehold.co/900x250/198754/white?text=Top+S%C3%A1ch+Hay+Nh%E1%BA%A5t+2024\n%C4%90%E1%BB%8Dc+M%E1%BB%8Di+L%C3%BAc+M%E1%BB%8Di+N%C6%A1i" class="d-block w-100" alt="Banner 2" style="height: 250px; object-fit: cover;">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#promoBanner" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#promoBanner" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>

                <div class="card shadow-sm border-0 mb-4 p-2 bg-white">
                    <div class="input-group input-group-lg">
                        <input type="text" id="keyword" class="form-control border-primary bg-light" placeholder="Nhập tên sách, tác giả hoặc ISBN để tìm kiếm..." style="border-width: 2px; font-size: 1rem;">
                        <button id="btn-search" class="btn btn-primary px-4 fw-bold" type="button" style="border-width: 2px;">
                            <i class="fas fa-search fs-5"></i>
                        </button>
                    </div>
                </div>

                <div id="alert-placeholder"></div>

                <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                    <h4 class="fw-bold text-dark mb-0 border-start border-4 border-primary ps-3">
                        <span id="list-title">Truyện Mới Cập Nhật</span>
                    </h4>
                </div>
                
                <div id="list-books" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
                    <div class="text-center w-100 py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto text-center">
        <p class="mb-0">© 2024 PolyBook Review - Assignment NodeJS</p>
    </footer>

    <template id="book-template">
        <div class="col">
            <div class="card h-100 book-card shadow-sm border-0 position-relative">
                <div class="position-relative">
                    <span class="position-absolute top-0 start-0 badge bg-danger m-2 category-badge"></span>
                    
                    <button class="btn-favorite position-absolute top-0 end-0 m-2 border-0 bg-white rounded-circle shadow-sm d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; z-index: 10;">
                        <i class="far fa-heart text-danger"></i>
                    </button>

                    <img src="" class="card-img-top book-img" alt="" onerror="handleImageError(this)" style="height: 250px; object-fit: cover; cursor: pointer;">
                </div>
                <div class="card-body d-flex flex-column">
                    <h6 class="card-title fw-bold book-title mb-1" title="" style="cursor: pointer; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"></h6>
                    <p class="card-text text-muted small mb-3 book-author"></p>
                    <div class="mt-auto">
                        <button class="btn btn-outline-primary btn-sm btn-detail w-100 fw-bold">Xem chi tiết</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="auth-template">
        <li class="nav-item dropdown ms-3">
            <a class="nav-link dropdown-toggle active fw-bold text-dark btn btn-light px-3" href="#" role="button" data-bs-toggle="dropdown">
                <i class="fas fa-user-circle me-1"></i> <span class="user-name"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
                <li class="admin-link-item" style="display: none;">
                    <a class="dropdown-item text-danger fw-bold py-2" href="admin/products.html">
                        <i class="fas fa-user-shield me-2"></i> Trang quản trị
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item fw-bold text-primary py-2" href="profile.html">
                        <i class="fas fa-id-card me-2"></i> Hồ sơ của tôi
                    </a>
                </li>
                <li>
                    <a class="dropdown-item text-danger btn-logout py-2" href="#">
                        <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                    </a>
                </li>
            </ul>
        </li>
    </template>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/home.js"></script>
</body>
</html>
