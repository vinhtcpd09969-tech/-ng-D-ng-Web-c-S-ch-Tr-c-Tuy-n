<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sách - PolyBook Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">
                <i class="fas fa-book-open me-2"></i>PolyBook Review
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item" id="login-nav-item">
                        <a class="nav-link btn btn-warning text-dark ms-2 fw-bold" href="login.html">Đăng nhập</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5" id="detail-container">
        <div class="text-center w-100 py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Đang tải thông tin sách...</p>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 mt-auto text-center">
        <p class="mb-0">© 2024 PolyBook Review</p>
    </footer>

    <template id="detail-template">
        <div class="row bg-white p-4 rounded shadow-sm animate-fade-in mb-5">
            <div class="col-md-4 mb-4 mb-md-0">
                <img src="" class="img-fluid rounded shadow book-img w-100" alt="" onerror="handleImageError(this)" style="object-fit: cover; max-height: 500px;">
            </div>
            
            <div class="col-md-8">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none">Trang chủ</a></li>
                        <li class="breadcrumb-item active book-breadcrumb" aria-current="page"></li>
                    </ol>
                </nav>

                <h2 class="fw-bold text-dark mb-2 book-title"></h2>
                
                <div class="d-flex align-items-center mb-3 border-bottom pb-3">
                    <span class="text-muted small book-author"></span>
                </div>

                <h5 class="fw-bold mt-4">Nội dung giới thiệu</h5>
                <div class="book-content bg-light p-3 rounded mb-4" style="font-size: 0.95rem; line-height: 1.8;"></div>

                <div class="read-actions mb-4 border-top pt-4"></div>

                <div id="chapter-list-client" class="mb-5"></div>

                <div class="d-flex justify-content-between align-items-center mt-5">
                    <h5 class="fw-bold text-primary mb-0"><i class="fas fa-comments me-2"></i>Đánh giá từ cộng đồng</h5>
                    <small class="text-muted fst-italic">*(Hãy đọc đến chương cuối để mở khóa tính năng đánh giá)*</small>
                </div>
                
                <div class="review-list mt-4">
                    <p class="text-muted fst-italic">Chưa có đánh giá nào. Hãy là người đầu tiên!</p>
                </div>
                
                <hr class="my-5">
                <h5 class="fw-bold text-dark mb-4"><i class="fas fa-layer-group me-2 text-primary"></i>Có thể bạn cũng thích</h5>
                <div id="related-books-list" class="row row-cols-2 row-cols-md-4 g-3 mb-2">
                    </div>
            </div>
        </div>
    </template>

<template id="auth-template">
        <li class="nav-item dropdown ms-3">
            <a class="nav-link dropdown-toggle active fw-bold text-dark btn btn-light px-3" href="#" role="button" data-bs-toggle="dropdown">
                <i class="fas fa-user-circle me-1"></i> <span class="user-name"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
                <li class="admin-link-item" style="display: none;">
                    <a class="dropdown-item text-danger fw-bold py-2" href="admin/products.html">
                        <i class="fas fa-user-shield me-2"></i> Trang quản trị
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item fw-bold text-primary py-2" href="profile.html">
                        <i class="fas fa-id-card me-2"></i> Hồ sơ của tôi
                    </a>
                </li>
                <li>
                    <a class="dropdown-item text-danger btn-logout py-2" href="#">
                        <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                    </a>
                </li>
            </ul>
        </li>
    </template>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/detail.js"></script> 
</body>
</html>
