<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - PolyBook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="index.html">
                <i class="fas fa-book-open me-2"></i>PolyBook Review
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item" id="login-nav-item">
                        <a class="nav-link btn btn-warning text-dark ms-2 fw-bold" href="login.html">Đăng nhập</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5 flex-grow-1">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card border-0 shadow-sm text-center pt-5 pb-4 rounded-4">
                    <img src="" id="avatar-img" class="rounded-circle mx-auto mb-3 shadow-sm" style="width: 130px; height: 130px; object-fit: cover; border: 4px solid #fff;" alt="Avatar">
                    <h4 class="fw-bold mb-1 text-dark" id="profile-name">Đang tải...</h4>
                    <span class="badge bg-info text-dark mb-4 px-3 py-2 rounded-pill" id="profile-role">Vai trò</span>
                    
                    <div class="px-4">
                        <hr class="text-muted">
                        <button class="btn btn-outline-danger fw-bold w-100 rounded-pill btn-logout">
                            <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất ngay
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white border-bottom fw-bold py-3 fs-5 d-flex align-items-center">
                        <i class="fas fa-history text-warning me-2 fs-4"></i> Sách đang đọc dở
                    </div>
                    <div class="card-body p-4" id="reading-history-list">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="text-muted mt-2">Đang tải lịch sử đọc...</p>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white border-bottom fw-bold py-3 fs-5 d-flex align-items-center">
                        <i class="fas fa-heart text-danger me-2 fs-4"></i> Sách yêu thích
                    </div>
                    <div class="card-body p-4" id="favorite-books-list">
                        <div class="text-center py-5">
                            <div class="spinner-border text-danger" role="status"></div>
                            <p class="text-muted mt-2">Đang tải danh sách yêu thích...</p>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-header bg-white border-bottom fw-bold py-3 fs-5 d-flex align-items-center">
                        <i class="fas fa-comment-dots text-success me-2 fs-4"></i> Đánh giá của tôi
                    </div>
                    <div class="card-body p-4" id="my-reviews-list">
                        <div class="text-center py-5">
                            <div class="spinner-border text-success" role="status"></div>
                            <p class="text-muted mt-2">Đang tải đánh giá...</p>
                        </div>
                    </div>
                </div>
                </div>
        </div>
    </main>

    <footer class="bg-dark text-light py-4 text-center mt-auto">
        <p class="mb-0">© 2024 PolyBook Review</p>
    </footer>

    <template id="auth-template">
        <li class="nav-item dropdown ms-3">
            <a class="nav-link dropdown-toggle active fw-bold text-dark" href="#" role="button" data-bs-toggle="dropdown">
                <i class="fas fa-user-circle me-1"></i> Xin chào, <span class="user-name"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                <li class="admin-link-item" style="display: none;">
                    <a class="dropdown-item text-danger fw-bold" href="admin/products.html">
                        <i class="fas fa-user-shield me-2"></i> Trang quản trị
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item fw-bold text-primary bg-light" href="profile.html">
                        <i class="fas fa-id-card me-2"></i> Hồ sơ của tôi
                    </a>
                </li>
                <li>
                    <a class="dropdown-item text-danger btn-logout" href="#">
                        <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                    </a>
                </li>
            </ul>
        </li>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
